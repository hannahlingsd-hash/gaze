<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gaze Topography</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f4ee;
    --ink: #1a1814;
    --ink-light: rgba(26,24,20,0.35);
    --ink-faint: rgba(26,24,20,0.12);
    --accent: #c8602a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* ---- Drop zone ---- */
  #dropzone {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    background: var(--cream);
    transition: opacity 400ms ease;
  }
  #dropzone.hidden { opacity: 0; pointer-events: none; }

  #dropzone .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-align: center;
    line-height: 1.1;
  }
  #dropzone .title em {
    font-style: italic;
    color: var(--accent);
  }

  #dropBox {
    width: min(420px, 88vw);
    height: 180px;
    border: 1.5px dashed var(--ink-light);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 200ms, background 200ms;
  }
  #dropBox:hover, #dropBox.over {
    border-color: var(--accent);
    background: rgba(200,96,42,0.04);
  }
  #dropBox .icon {
    font-size: 28px;
    opacity: 0.4;
  }
  #dropBox p {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.5;
    text-align: center;
    line-height: 1.6;
  }
  #dropBox p strong { color: var(--accent); opacity: 1; font-weight: 400; }
  #fileInput { display: none; }

  #dropzone .sub {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.3;
  }

  /* ---- Canvas ---- */
  #canvas {
    position: fixed;
    inset: 0;
    display: none;
  }

  /* ---- Top bar ---- */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--ink-faint);
    background: rgba(247,244,238,0.85);
    backdrop-filter: blur(8px);
    z-index: 50;
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  #topbar .meta { opacity: 0.45; }
  #topbar .controls { display: flex; gap: 12px; align-items: center; }
  #topbar button {
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 150ms, background 150ms;
  }
  #topbar button:hover { border-color: var(--accent); background: rgba(200,96,42,0.06); }

  /* ---- Scrubber ---- */
  #scrubber {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    display: none;
    align-items: center;
    gap: 14px;
    padding: 0 24px;
    border-top: 1px solid var(--ink-faint);
    background: rgba(247,244,238,0.88);
    backdrop-filter: blur(8px);
    z-index: 50;
  }
  #scrubTime {
    font-size: 11px;
    letter-spacing: 0.06em;
    opacity: 0.55;
    min-width: 44px;
    font-variant-numeric: tabular-nums;
  }
  #scrubPlay {
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink);
    font-size: 11px;
    width: 28px; height: 28px;
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color 150ms;
  }
  #scrubPlay:hover { border-color: var(--accent); }

  #scrubRange {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 1px;
    background: var(--ink-faint);
    outline: none;
    cursor: pointer;
  }
  #scrubRange::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
  }
  #scrubRange::-moz-range-thumb {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: pointer;
  }
  #scrubDur {
    font-size: 11px;
    letter-spacing: 0.06em;
    opacity: 0.3;
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Export PNG btn ---- */
  #exportBtn { }

  /* ---- Loading indicator ---- */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.5;
  }
</style>
</head>
<body>

<!-- Drop zone -->
<div id="dropzone">
  <div class="title">Gaze <em>Topography</em></div>
  <div id="dropBox">
    <div class="icon">◎</div>
    <p>Drop a <strong>.wgz</strong> session file here<br>or click to browse</p>
  </div>
  <div class="sub">Generated from WebGazer session export</div>
  <input type="file" id="fileInput" accept=".wgz,.json" />
</div>

<!-- Loading -->
<div id="loading">Rendering…</div>

<!-- Main canvas -->
<canvas id="canvas"></canvas>

<!-- Top bar -->
<div id="topbar">
  <div class="meta" id="metaText">—</div>
  <div class="controls">
    <button id="resetBtn">← Load new</button>
    <button id="exportBtn">↓ Export PNG</button>
  </div>
</div>

<!-- Scrubber -->
<div id="scrubber">
  <button id="scrubPlay">▶</button>
  <span id="scrubTime">0.0s</span>
  <input type="range" id="scrubRange" min="0" max="30000" step="100" value="30000" />
  <span id="scrubDur">30.0s</span>
</div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const KDE_GRID    = 160;
const N_CONTOURS  = 18;
const MIN_LEVEL   = 0.06;
const BANDWIDTH_FRAC = 0.055;
const CHAIKIN_PASSES = 4;
const MIN_CONTOUR_PTS = 3;
const FALLOFF_SQ  = (KDE_GRID * BANDWIDTH_FRAC * 6) ** 2;

// Stimulus gradient stops (matching the WebGazer HTML)
const GRAD_STOPS = [
  { t: 0.00, r: 11,  g: 11,  b: 26  },
  { t: 0.25, r: 29,  g: 59,  b: 122 },
  { t: 0.50, r: 43,  g: 179, b: 163 },
  { t: 0.75, r: 244, g: 211, b: 94  },
  { t: 1.00, r: 249, g: 87,  b: 56  },
];

// ─────────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────────
const dropzone  = document.getElementById('dropzone');
const dropBox   = document.getElementById('dropBox');
const fileInput = document.getElementById('fileInput');
const loading   = document.getElementById('loading');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const topbar    = document.getElementById('topbar');
const metaText  = document.getElementById('metaText');
const scrubber  = document.getElementById('scrubber');
const scrubRange= document.getElementById('scrubRange');
const scrubTime = document.getElementById('scrubTime');
const scrubDur  = document.getElementById('scrubDur');
const scrubPlay = document.getElementById('scrubPlay');
const resetBtn  = document.getElementById('resetBtn');
const exportBtn = document.getElementById('exportBtn');

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let session      = null;  // loaded .wgz data
let scrubMaxMs   = 30000;
let isPlaying    = false;
let playRafId    = null;
let playStartWall= 0;
let playStartMs  = 0;

// ─────────────────────────────────────────────
// FILE LOADING
// ─────────────────────────────────────────────
dropBox.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
  fileInput.value = '';
});

dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('over'));
dropBox.addEventListener('drop', e => {
  e.preventDefault();
  dropBox.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

function loadFile(file) {
  loading.style.display = 'flex';
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); } catch(err) {
      loading.style.display = 'none';
      alert('Could not parse file. Make sure it\'s a .wgz session export.');
      return;
    }
    if (data._type !== 'webgazer_session') {
      loading.style.display = 'none';
      alert('Not a WebGazer session file.');
      return;
    }
    session = data;

    // Rebuild scanpath if missing (from raw samples)
    if (!session.scanpath || session.scanpath.length < 2) {
      session.scanpath = buildScanpath(session.samples);
    }

    scrubMaxMs = session.actual_duration_ms
      || (session.samples.length > 0 ? session.samples[session.samples.length-1].t_ms : 30000);

    scrubRange.max   = scrubMaxMs;
    scrubRange.value = scrubMaxMs;
    scrubDur.textContent  = fmt(scrubMaxMs);
    scrubTime.textContent = fmt(scrubMaxMs);

    const pid  = session.participant_id || '—';
    const cond = session.condition      || '—';
    const n    = session.samples.filter(s => s.valid).length;
    metaText.textContent = `${pid}  ·  ${cond}  ·  ${n} valid samples`;

    dropzone.classList.add('hidden');

    resizeCanvas();
    setTimeout(() => {
      render(scrubMaxMs);
      canvas.style.display  = 'block';
      topbar.style.display  = 'flex';
      scrubber.style.display = 'flex';
      loading.style.display = 'none';
    }, 60);
  };
  reader.readAsText(file);
}

function buildScanpath(samples) {
  const out = [];
  let lastT = -Infinity;
  for (const s of samples) {
    if (!s.valid || typeof s.x_px !== 'number') continue;
    if (s.t_ms - lastT < 200) continue;
    out.push({ t_ms: s.t_ms, x_px: s.x_px, y_px: s.y_px });
    lastT = s.t_ms;
  }
  return out;
}

// ─────────────────────────────────────────────
// CANVAS RESIZE
// ─────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}
window.addEventListener('resize', () => {
  resizeCanvas();
  if (session) render(Number(scrubRange.value));
});

// ─────────────────────────────────────────────
// GRADIENT COLOR SAMPLER
// ─────────────────────────────────────────────
function sampleGradient(t) {
  // t is normalized 0–1 horizontal position
  t = Math.max(0, Math.min(1, t));
  for (let i = 0; i < GRAD_STOPS.length - 1; i++) {
    const a = GRAD_STOPS[i];
    const b = GRAD_STOPS[i+1];
    if (t >= a.t && t <= b.t) {
      const f = (t - a.t) / (b.t - a.t);
      return {
        r: Math.round(a.r + (b.r - a.r) * f),
        g: Math.round(a.g + (b.g - a.g) * f),
        b: Math.round(a.b + (b.b - a.b) * f),
      };
    }
  }
  return GRAD_STOPS[GRAD_STOPS.length - 1];
}

// ─────────────────────────────────────────────
// KDE FIELD
// ─────────────────────────────────────────────
function buildKDEField(samples, maxT) {
  const W  = canvas.width;
  const H  = canvas.height;
  const bw = Math.min(W, H) * BANDWIDTH_FRAC;
  const bw2 = bw * bw;
  const field = new Float32Array(KDE_GRID * KDE_GRID);

  for (const s of samples) {
    if (s.t_ms > maxT) break;
    if (!s.valid || typeof s.x_px !== 'number') continue;

    const gx = (s.x_px / W) * KDE_GRID;
    const gy = (s.y_px / H) * KDE_GRID;
    const bwCells = (bw / W) * KDE_GRID;
    const r = Math.ceil(bwCells * 2.5);

    const x0 = Math.max(0, Math.floor(gx - r));
    const x1 = Math.min(KDE_GRID - 1, Math.ceil(gx + r));
    const y0 = Math.max(0, Math.floor(gy - r));
    const y1 = Math.min(KDE_GRID - 1, Math.ceil(gy + r));

    for (let cy = y0; cy <= y1; cy++) {
      for (let cx = x0; cx <= x1; cx++) {
        const sx = (cx / KDE_GRID) * W;
        const sy = (cy / KDE_GRID) * H;
        const dx = sx - s.x_px;
        const dy = sy - s.y_px;
        field[cy * KDE_GRID + cx] += Math.exp(-(dx*dx + dy*dy) / (2 * bw2));
      }
    }
  }

  let maxVal = 0;
  for (let i = 0; i < field.length; i++) if (field[i] > maxVal) maxVal = field[i];
  if (maxVal > 0) for (let i = 0; i < field.length; i++) field[i] /= maxVal;

  return { field, W, H };
}

// ─────────────────────────────────────────────
// MARCHING SQUARES
// ─────────────────────────────────────────────
function marchingSquares(field, level) {
  const lines = [];

  for (let gy = 0; gy < KDE_GRID - 1; gy++) {
    for (let gx = 0; gx < KDE_GRID - 1; gx++) {
      const tl = field[ gy      * KDE_GRID + gx    ];
      const tr = field[ gy      * KDE_GRID + gx + 1];
      const bl = field[(gy + 1) * KDE_GRID + gx    ];
      const br = field[(gy + 1) * KDE_GRID + gx + 1];

      const config =
        (tl >= level ? 8 : 0) |
        (tr >= level ? 4 : 0) |
        (br >= level ? 2 : 0) |
        (bl >= level ? 1 : 0);

      if (config === 0 || config === 15) continue;

      // Interpolate edge crossings
      const lerp = (a, b) => (level - a) / (b - a);

      const top   = { x: gx + lerp(tl, tr), y: gy       };
      const right = { x: gx + 1,             y: gy + lerp(tr, br) };
      const bot   = { x: gx + lerp(bl, br),  y: gy + 1  };
      const left  = { x: gx,                 y: gy + lerp(tl, bl) };

      const segs = {
        1:  [left, bot],   2:  [bot, right],  3:  [left, right],
        4:  [right, top],  6:  [bot, top],    7:  [left, top],
        8:  [top, left],   9:  [top, bot],    11: [top, right],
        12: [right, left], 13: [bot, left],   14: [right, bot],
      };
      // Saddle cases
      const seg = segs[config];
      if (seg) lines.push([seg[0], seg[1]]);
      else if (config === 5)  { lines.push([top, right]); lines.push([bot, left]); }
      else if (config === 10) { lines.push([top, left]);  lines.push([bot, right]); }
    }
  }

  // Chain segments into polylines
  return chainSegments(lines);
}

function chainSegments(segments) {
  if (!segments.length) return [];
  const eps = 0.01;
  const used = new Uint8Array(segments.length);
  const chains = [];

  for (let i = 0; i < segments.length; i++) {
    if (used[i]) continue;
    used[i] = 1;
    const chain = [segments[i][0], segments[i][1]];

    let extended = true;
    while (extended) {
      extended = false;
      const head = chain[0];
      const tail = chain[chain.length - 1];
      for (let j = 0; j < segments.length; j++) {
        if (used[j]) continue;
        const [a, b] = segments[j];
        if (dist(tail, a) < eps) { chain.push(b); used[j] = 1; extended = true; break; }
        if (dist(tail, b) < eps) { chain.push(a); used[j] = 1; extended = true; break; }
        if (dist(head, a) < eps) { chain.unshift(b); used[j] = 1; extended = true; break; }
        if (dist(head, b) < eps) { chain.unshift(a); used[j] = 1; extended = true; break; }
      }
    }
    if (chain.length >= MIN_CONTOUR_PTS) chains.push(chain);
  }
  return chains;
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ─────────────────────────────────────────────
// CHAIKIN SMOOTHING
// ─────────────────────────────────────────────
function chaikin(pts, passes) {
  let p = pts;
  for (let pass = 0; pass < passes; pass++) {
    const np = [];
    for (let i = 0; i < p.length - 1; i++) {
      np.push({ x: p[i].x * 0.75 + p[i+1].x * 0.25, y: p[i].y * 0.75 + p[i+1].y * 0.25 });
      np.push({ x: p[i].x * 0.25 + p[i+1].x * 0.75, y: p[i].y * 0.25 + p[i+1].y * 0.75 });
    }
    // Close loops
    if (dist(p[0], p[p.length-1]) < 0.1) {
      np.push(np[0]);
    } else {
      np.unshift(p[0]);
      np.push(p[p.length-1]);
    }
    p = np;
  }
  return p;
}

// ─────────────────────────────────────────────
// NEAREST FIXATION — returns {gradT, distSq, fixIdx}
// ─────────────────────────────────────────────
function buildFixationLookup(scanPts, W, H) {
  return scanPts.map((p, i) => ({
    gx:    (p.x_px / W) * KDE_GRID,
    gy:    (p.y_px / H) * KDE_GRID,
    gradT: p.x_px / W,
    idx:   i,
  }));
}

function nearestFixation(gx, gy, fixLookup) {
  if (!fixLookup.length) return { gradT: 0.5, distSq: Infinity, idx: -1 };
  let bestDistSq = Infinity, bestT = 0.5, bestIdx = 0;
  for (const f of fixLookup) {
    const d = (gx - f.gx) ** 2 + (gy - f.gy) ** 2;
    if (d < bestDistSq) { bestDistSq = d; bestT = f.gradT; bestIdx = f.idx; }
  }
  return { gradT: bestT, distSq: bestDistSq, idx: bestIdx };
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render(maxT) {
  const W = canvas.width;
  const H = canvas.height;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  if (!session || !session.samples) return;

  const validSamples = session.samples.filter(s => s.t_ms <= maxT && s.valid);
  if (validSamples.length < 4) {
    ctx.fillStyle = 'rgba(26,24,20,0.15)';
    ctx.font = '400 12px "DM Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('not enough data at this timestamp', W/2, H/2);
    return;
  }

  const { field } = buildKDEField(session.samples, maxT);

  const toScreen = (gx, gy) => ({
    x: (gx / KDE_GRID) * W,
    y: (gy / KDE_GRID) * H,
  });

  const scanPts  = session.scanpath.filter(p => p.t_ms <= maxT);
  const fixLookup = buildFixationLookup(scanPts, W, H);

  const dwells = scanPts.map((p, i) => {
    const nextT = i < scanPts.length - 1 ? scanPts[i+1].t_ms : maxT;
    return (nextT - p.t_ms) / 1000;
  });

  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  // Build contour levels
  const levels = [];
  for (let i = 0; i < N_CONTOURS; i++) {
    levels.push(MIN_LEVEL + (1 - MIN_LEVEL) * (i / (N_CONTOURS - 1)));
  }

  for (let li = 0; li < levels.length; li++) {
    const level   = levels[li];
    const t_level = (level - MIN_LEVEL) / (1 - MIN_LEVEL);

    const chains = marchingSquares(field, level);

    for (const chain of chains) {
      if (chain.length < MIN_CONTOUR_PTS) continue;
      const smoothed = chaikin(chain, CHAIKIN_PASSES);

      // Draw segment by segment — each gets nearest-fixation color
      let currentKey = null;
      let segOpen    = false;

      for (let i = 0; i < smoothed.length - 1; i++) {
        const p0    = smoothed[i];
        const p1    = smoothed[i + 1];
        const midGx = (p0.x + p1.x) * 0.5;
        const midGy = (p0.y + p1.y) * 0.5;

        const { gradT, distSq } = nearestFixation(midGx, midGy, fixLookup);
        const col   = sampleGradient(gradT);

        // Proximity factor — only affects alpha/weight, never suppresses
        const proximity = Math.max(0.15, 1 - distSq / (FALLOFF_SQ * 2));
        const alpha = (0.22 + t_level * 0.60) * proximity;
        const lw    = (0.4  + t_level * 1.8)  * (0.5 + proximity * 0.5);

        const key = `${col.r},${col.g},${col.b},${alpha.toFixed(2)},${lw.toFixed(2)}`;
        const sp0 = toScreen(p0.x, p0.y);
        const sp1 = toScreen(p1.x, p1.y);

        if (key !== currentKey) {
          if (segOpen) ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(sp0.x, sp0.y);
          ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha.toFixed(3)})`;
          ctx.lineWidth   = lw;
          currentKey = key;
          segOpen    = true;
        }
        ctx.lineTo(sp1.x, sp1.y);
      }
      if (segOpen) ctx.stroke();
    }
  }

  // ── Thin scanpath line ──
  if (scanPts.length >= 2) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(scanPts[0].x_px, scanPts[0].y_px);
    for (let i = 1; i < scanPts.length; i++) ctx.lineTo(scanPts[i].x_px, scanPts[i].y_px);
    ctx.strokeStyle = 'rgba(26,24,20,0.12)';
    ctx.lineWidth = 0.75;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // ── Fixation dots + labels (no arc rings — the contours ARE the rings) ──
  const nodeField = (x, y) => {
    const gx = Math.round((x / W) * (KDE_GRID - 1));
    const gy = Math.round((y / H) * (KDE_GRID - 1));
    return field[Math.max(0, Math.min(KDE_GRID * KDE_GRID - 1, gy * KDE_GRID + gx))] || 0;
  };

  ctx.save();
  ctx.font = '300 10px "DM Mono", monospace';

  for (let i = 0; i < scanPts.length; i++) {
    const p       = scanPts[i];
    const dwell   = dwells[i];
    const density = nodeField(p.x_px, p.y_px);
    const gradT   = p.x_px / W;
    const col     = sampleGradient(gradT);
    const radius  = 3 + density * 9;

    // Filled dot
    ctx.beginPath();
    ctx.arc(p.x_px, p.y_px, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},0.95)`;
    ctx.fill();

    // White center pin
    ctx.beginPath();
    ctx.arc(p.x_px, p.y_px, radius * 0.38, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();

    // Label
    const labelX  = p.x_px + radius + 8;
    const labelY  = p.y_px;
    const label1  = `#${i + 1}`;
    const label2  = `${dwell.toFixed(1)}s`;
    const pillW   = Math.max(ctx.measureText(label1).width, ctx.measureText(label2).width) + 10;

    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fillRect(labelX - 3, labelY - 14, pillW, 26);

    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},1.0)`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(label1, labelX, labelY - 5);

    ctx.fillStyle = 'rgba(26,24,20,0.5)';
    ctx.fillText(label2, labelX, labelY + 7);
  }
  ctx.restore();

  // Stamp
  ctx.save();
  ctx.font = '300 10px "DM Mono", monospace';
  ctx.fillStyle = 'rgba(26,24,20,0.18)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`${session.participant_id || '—'} · ${session.condition || '—'} · ${fmt(maxT)}`, W - 20, H - 60);
  ctx.restore();
}

// ─────────────────────────────────────────────
// SCRUBBER
// ─────────────────────────────────────────────
function fmt(ms) { return (ms / 1000).toFixed(1) + 's'; }

scrubRange.addEventListener('input', () => {
  stopPlay();
  const t = Number(scrubRange.value);
  scrubTime.textContent = fmt(t);
  render(t);
});

function stopPlay() {
  if (playRafId) { cancelAnimationFrame(playRafId); playRafId = null; }
  isPlaying = false;
  scrubPlay.textContent = '▶';
}

function startPlay() {
  isPlaying = true;
  scrubPlay.textContent = '⏸';
  const from = Number(scrubRange.value) >= scrubMaxMs ? 0 : Number(scrubRange.value);
  playStartWall = performance.now();
  playStartMs   = from;

  function tick(now) {
    const t = playStartMs + (now - playStartWall);
    if (t >= scrubMaxMs) {
      scrubRange.value = scrubMaxMs;
      scrubTime.textContent = fmt(scrubMaxMs);
      render(scrubMaxMs);
      stopPlay();
      return;
    }
    scrubRange.value = t;
    scrubTime.textContent = fmt(t);
    render(t);
    playRafId = requestAnimationFrame(tick);
  }
  playRafId = requestAnimationFrame(tick);
}

scrubPlay.addEventListener('click', () => {
  if (isPlaying) stopPlay(); else startPlay();
});

// ─────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  stopPlay();
  session = null;
  canvas.style.display  = 'none';
  topbar.style.display  = 'none';
  scrubber.style.display = 'none';
  dropzone.classList.remove('hidden');
});

// ─────────────────────────────────────────────
// EXPORT PNG
// ─────────────────────────────────────────────
exportBtn.addEventListener('click', () => {
  if (!session) return;
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const pid  = session.participant_id || 'p';
    const cond = (session.condition || 'cond').replace(/\s+/g,'_');
    const t    = Math.round(Number(scrubRange.value) / 1000);
    a.download = `topo_${pid}_${cond}_${t}s.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
});
</script>
