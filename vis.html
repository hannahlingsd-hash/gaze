<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gaze Topography</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f4ee;
    --ink: #1a1814;
    --ink-light: rgba(26,24,20,0.35);
    --ink-faint: rgba(26,24,20,0.12);
    --accent: #c8602a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* ---- Drop zone ---- */
  #dropzone {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    background: var(--cream);
    transition: opacity 400ms ease;
  }
  #dropzone.hidden { opacity: 0; pointer-events: none; }

  #dropzone .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-align: center;
    line-height: 1.1;
  }
  #dropzone .title em {
    font-style: italic;
    color: var(--accent);
  }

  #dropBox {
    width: min(420px, 88vw);
    height: 180px;
    border: 1.5px dashed var(--ink-light);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 200ms, background 200ms;
  }
  #dropBox:hover, #dropBox.over {
    border-color: var(--accent);
    background: rgba(200,96,42,0.04);
  }
  #dropBox .icon {
    font-size: 28px;
    opacity: 0.4;
  }
  #dropBox p {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.5;
    text-align: center;
    line-height: 1.6;
  }
  #dropBox p strong { color: var(--accent); opacity: 1; font-weight: 400; }
  #fileInput { display: none; }

  #dropzone .sub {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.3;
  }

  /* ---- Canvas ---- */
  #canvas {
    position: fixed;
    inset: 0;
    display: none;
  }

  /* ---- Top bar ---- */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--ink-faint);
    background: rgba(247,244,238,0.85);
    backdrop-filter: blur(8px);
    z-index: 50;
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  #topbar .meta { opacity: 0.45; }
  #topbar .controls { display: flex; gap: 12px; align-items: center; }
  #topbar button {
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 150ms, background 150ms;
  }
  #topbar button:hover { border-color: var(--accent); background: rgba(200,96,42,0.06); }

  /* ---- Scrubber ---- */
  #scrubber {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    display: none;
    align-items: center;
    gap: 14px;
    padding: 0 24px;
    border-top: 1px solid var(--ink-faint);
    background: rgba(247,244,238,0.88);
    backdrop-filter: blur(8px);
    z-index: 50;
  }
  #scrubTime {
    font-size: 11px;
    letter-spacing: 0.06em;
    opacity: 0.55;
    min-width: 44px;
    font-variant-numeric: tabular-nums;
  }
  #scrubPlay {
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink);
    font-size: 11px;
    width: 28px; height: 28px;
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color 150ms;
  }
  #scrubPlay:hover { border-color: var(--accent); }

  #scrubRange {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 1px;
    background: var(--ink-faint);
    outline: none;
    cursor: pointer;
  }
  #scrubRange::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
  }
  #scrubRange::-moz-range-thumb {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: pointer;
  }
  #scrubDur {
    font-size: 11px;
    letter-spacing: 0.06em;
    opacity: 0.3;
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Export PNG btn ---- */
  #exportBtn { }

  /* ---- Loading indicator ---- */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.5;
  }
</style>
</head>
<body>

<!-- Drop zone -->
<div id="dropzone">
  <div class="title">Gaze <em>Topography</em></div>
  <div id="dropBox">
    <div class="icon">◎</div>
    <p>Drop a <strong>.wgz</strong> session file here<br>or click to browse</p>
  </div>
  <div class="sub">Generated from WebGazer session export</div>
  <input type="file" id="fileInput" accept=".wgz,.json" />
</div>

<!-- Loading -->
<div id="loading">Rendering…</div>

<!-- Main canvas -->
<canvas id="canvas"></canvas>

<!-- Top bar -->
<div id="topbar">
  <div class="meta" id="metaText">—</div>
  <div class="controls">
    <button id="resetBtn">← Load new</button>
    <button id="exportBtn">↓ Export PNG</button>
  </div>
</div>

<!-- Scrubber -->
<div id="scrubber">
  <button id="scrubPlay">▶</button>
  <span id="scrubTime">0.0s</span>
  <input type="range" id="scrubRange" min="0" max="30000" step="100" value="30000" />
  <span id="scrubDur">30.0s</span>
</div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const KDE_GRID       = 160;   // density grid resolution
const N_CONTOURS     = 20;    // iso-contour levels
const MIN_LEVEL      = 0.05;  // lowest iso-level drawn
const BANDWIDTH_FRAC = 0.055; // KDE gaussian bandwidth fraction of min(W,H)
const CHAIKIN_PASSES = 3;     // smoothing passes
const MIN_PTS        = 3;     // min points to draw a chain

const GRAD_STOPS = [
  { t: 0.00, r: 11,  g: 11,  b: 26  },
  { t: 0.25, r: 29,  g: 59,  b: 122 },
  { t: 0.50, r: 43,  g: 179, b: 163 },
  { t: 0.75, r: 244, g: 211, b: 94  },
  { t: 1.00, r: 249, g: 87,  b: 56  },
];

// ─────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────
const dropzone   = document.getElementById('dropzone');
const dropBox    = document.getElementById('dropBox');
const fileInput  = document.getElementById('fileInput');
const loading    = document.getElementById('loading');
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const topbar     = document.getElementById('topbar');
const metaText   = document.getElementById('metaText');
const scrubber   = document.getElementById('scrubber');
const scrubRange = document.getElementById('scrubRange');
const scrubTime  = document.getElementById('scrubTime');
const scrubDur   = document.getElementById('scrubDur');
const scrubPlay  = document.getElementById('scrubPlay');
const resetBtn   = document.getElementById('resetBtn');
const exportBtn  = document.getElementById('exportBtn');

let session      = null;
let scrubMaxMs   = 30000;
let isPlaying    = false;
let playRafId    = null;
let playStartWall = 0;
let playStartMs  = 0;

// ─────────────────────────────────────────────
// FILE LOADING
// ─────────────────────────────────────────────
dropBox.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
  fileInput.value = '';
});
dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('over'));
dropBox.addEventListener('drop', e => {
  e.preventDefault(); dropBox.classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  loading.style.display = 'flex';
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); }
    catch(err) { loading.style.display = 'none'; alert('Could not parse file.'); return; }
    if (data._type !== 'webgazer_session') {
      loading.style.display = 'none'; alert('Not a WebGazer session file.'); return;
    }
    session = data;
    if (!session.scanpath || session.scanpath.length < 2) {
      session.scanpath = buildScanpath(session.samples);
    }
    scrubMaxMs = session.actual_duration_ms
      || (session.samples.length > 0 ? session.samples[session.samples.length-1].t_ms : 30000);
    scrubRange.max   = scrubMaxMs;
    scrubRange.value = scrubMaxMs;
    scrubDur.textContent  = fmt(scrubMaxMs);
    scrubTime.textContent = fmt(scrubMaxMs);
    const n = session.samples.filter(s => s.valid).length;
    metaText.textContent = `${session.participant_id||'—'} · ${session.condition||'—'} · ${n} valid samples`;
    dropzone.classList.add('hidden');
    resizeCanvas();
    setTimeout(() => {
      render(scrubMaxMs);
      canvas.style.display   = 'block';
      topbar.style.display   = 'flex';
      scrubber.style.display = 'flex';
      loading.style.display  = 'none';
    }, 60);
  };
  reader.readAsText(file);
}

function buildScanpath(samples) {
  const out = []; let lastT = -Infinity;
  for (const s of samples) {
    if (!s.valid || typeof s.x_px !== 'number') continue;
    if (s.t_ms - lastT < 200) continue;
    out.push({ t_ms: s.t_ms, x_px: s.x_px, y_px: s.y_px });
    lastT = s.t_ms;
  }
  return out;
}

// ─────────────────────────────────────────────
// CANVAS RESIZE
// ─────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}
window.addEventListener('resize', () => { resizeCanvas(); if (session) render(Number(scrubRange.value)); });

// ─────────────────────────────────────────────
// GRADIENT COLOR SAMPLER
// ─────────────────────────────────────────────
function sampleGradient(t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 0; i < GRAD_STOPS.length - 1; i++) {
    const a = GRAD_STOPS[i], b = GRAD_STOPS[i+1];
    if (t >= a.t && t <= b.t) {
      const f = (t - a.t) / (b.t - a.t);
      return { r: Math.round(a.r+(b.r-a.r)*f), g: Math.round(a.g+(b.g-a.g)*f), b: Math.round(a.b+(b.b-a.b)*f) };
    }
  }
  return GRAD_STOPS[GRAD_STOPS.length-1];
}

// ─────────────────────────────────────────────
// KDE FIELD
// ─────────────────────────────────────────────
function buildKDEField(samples, maxT) {
  const W = canvas.width, H = canvas.height;
  const bw  = Math.min(W, H) * BANDWIDTH_FRAC;
  const bw2 = bw * bw;
  const field = new Float32Array(KDE_GRID * KDE_GRID);

  for (const s of samples) {
    if (s.t_ms > maxT) break;
    if (!s.valid || typeof s.x_px !== 'number') continue;
    const gx = (s.x_px / W) * KDE_GRID;
    const gy = (s.y_px / H) * KDE_GRID;
    const bwCells = (bw / W) * KDE_GRID;
    const r = Math.ceil(bwCells * 2.5);
    const x0 = Math.max(0, Math.floor(gx-r)), x1 = Math.min(KDE_GRID-1, Math.ceil(gx+r));
    const y0 = Math.max(0, Math.floor(gy-r)), y1 = Math.min(KDE_GRID-1, Math.ceil(gy+r));
    for (let cy = y0; cy <= y1; cy++) {
      for (let cx = x0; cx <= x1; cx++) {
        const dx = (cx/KDE_GRID)*W - s.x_px, dy = (cy/KDE_GRID)*H - s.y_px;
        field[cy*KDE_GRID+cx] += Math.exp(-(dx*dx+dy*dy)/(2*bw2));
      }
    }
  }
  let maxVal = 0;
  for (let i = 0; i < field.length; i++) if (field[i] > maxVal) maxVal = field[i];
  if (maxVal > 0) for (let i = 0; i < field.length; i++) field[i] /= maxVal;
  return field;
}

// ─────────────────────────────────────────────
// MARCHING SQUARES
// ─────────────────────────────────────────────
function marchingSquares(field, level) {
  const segs = [];
  const lerp = (a, b) => (level - a) / (b - a);

  for (let gy = 0; gy < KDE_GRID-1; gy++) {
    for (let gx = 0; gx < KDE_GRID-1; gx++) {
      const tl = field[gy*KDE_GRID+gx], tr = field[gy*KDE_GRID+gx+1];
      const bl = field[(gy+1)*KDE_GRID+gx], br = field[(gy+1)*KDE_GRID+gx+1];
      const cfg = (tl>=level?8:0)|(tr>=level?4:0)|(br>=level?2:0)|(bl>=level?1:0);
      if (cfg===0||cfg===15) continue;

      const top   = {x:gx+lerp(tl,tr), y:gy};
      const right = {x:gx+1,            y:gy+lerp(tr,br)};
      const bot   = {x:gx+lerp(bl,br),  y:gy+1};
      const left  = {x:gx,              y:gy+lerp(tl,bl)};

      const map = {1:[left,bot],2:[bot,right],3:[left,right],4:[right,top],
                   6:[bot,top],7:[left,top],8:[top,left],9:[top,bot],
                   11:[top,right],12:[right,left],13:[bot,left],14:[right,bot]};
      if (map[cfg]) { segs.push(map[cfg]); }
      else if (cfg===5)  { segs.push([top,right]); segs.push([bot,left]); }
      else if (cfg===10) { segs.push([top,left]);  segs.push([bot,right]); }
    }
  }
  return chainSegs(segs);
}

function chainSegs(segs) {
  if (!segs.length) return [];
  const eps  = 0.01;
  const used = new Uint8Array(segs.length);
  const chains = [];
  for (let i = 0; i < segs.length; i++) {
    if (used[i]) continue;
    used[i] = 1;
    const chain = [segs[i][0], segs[i][1]];
    let grew = true;
    while (grew) {
      grew = false;
      const head = chain[0], tail = chain[chain.length-1];
      for (let j = 0; j < segs.length; j++) {
        if (used[j]) continue;
        const [a, b] = segs[j];
        const dta = (tail.x-a.x)**2+(tail.y-a.y)**2;
        const dtb = (tail.x-b.x)**2+(tail.y-b.y)**2;
        const dha = (head.x-a.x)**2+(head.y-a.y)**2;
        const dhb = (head.x-b.x)**2+(head.y-b.y)**2;
        if (dta<eps) { chain.push(b); used[j]=1; grew=true; break; }
        if (dtb<eps) { chain.push(a); used[j]=1; grew=true; break; }
        if (dha<eps) { chain.unshift(b); used[j]=1; grew=true; break; }
        if (dhb<eps) { chain.unshift(a); used[j]=1; grew=true; break; }
      }
    }
    if (chain.length >= MIN_PTS) chains.push(chain);
  }
  return chains;
}

// ─────────────────────────────────────────────
// CHAIKIN SMOOTHING
// ─────────────────────────────────────────────
function chaikin(pts, passes) {
  let p = pts;
  for (let pass = 0; pass < passes; pass++) {
    const np = [];
    for (let i = 0; i < p.length-1; i++) {
      np.push({x: p[i].x*0.75+p[i+1].x*0.25, y: p[i].y*0.75+p[i+1].y*0.25});
      np.push({x: p[i].x*0.25+p[i+1].x*0.75, y: p[i].y*0.25+p[i+1].y*0.75});
    }
    const isLoop = (p[0].x-p[p.length-1].x)**2+(p[0].y-p[p.length-1].y)**2 < 0.01;
    if (isLoop) np.push(np[0]); else { np.unshift(p[0]); np.push(p[p.length-1]); }
    p = np;
  }
  return p;
}

// ─────────────────────────────────────────────
// NEAREST FIXATION
// ─────────────────────────────────────────────
function buildFixLookup(scanPts, W, H) {
  return scanPts.map(p => ({
    gx: (p.x_px / W) * KDE_GRID,
    gy: (p.y_px / H) * KDE_GRID,
    gradT: p.x_px / W,
  }));
}

function nearestFix(gx, gy, fixList) {
  if (!fixList.length) return { gradT: gx / KDE_GRID, distSq: 0 };
  let bestD = Infinity, bestT = 0.5;
  for (const f of fixList) {
    const d = (gx-f.gx)**2 + (gy-f.gy)**2;
    if (d < bestD) { bestD = d; bestT = f.gradT; }
  }
  return { gradT: bestT, distSq: bestD };
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render(maxT) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  if (!session || !session.samples) return;

  const valid = session.samples.filter(s => s.t_ms <= maxT && s.valid);
  if (valid.length < 4) {
    ctx.fillStyle = 'rgba(26,24,20,0.15)';
    ctx.font = '400 12px "DM Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('not enough data at this timestamp', W/2, H/2);
    return;
  }

  const field    = buildKDEField(session.samples, maxT);
  const scanPts  = session.scanpath.filter(p => p.t_ms <= maxT);
  const fixList  = buildFixLookup(scanPts, W, H);
  const dwells   = scanPts.map((p, i) => {
    const nextT = i < scanPts.length-1 ? scanPts[i+1].t_ms : maxT;
    return (nextT - p.t_ms) / 1000;
  });

  // Proximity falloff distance in grid cells
  // Chains whose centroid is within this of a fixation draw at full intensity
  // Beyond it they fade but never disappear (min 0.15 proximity)
  const falloffSq = (KDE_GRID * 0.28) ** 2;

  const levels = [];
  for (let i = 0; i < N_CONTOURS; i++) {
    levels.push(MIN_LEVEL + (1 - MIN_LEVEL) * (i / (N_CONTOURS - 1)));
  }

  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  for (let li = 0; li < levels.length; li++) {
    const level   = levels[li];
    const tl      = (level - MIN_LEVEL) / (1 - MIN_LEVEL); // 0=outer, 1=inner

    const chains  = marchingSquares(field, level);

    for (const chain of chains) {
      if (chain.length < MIN_PTS) continue;
      const sm = chaikin(chain, CHAIKIN_PASSES);
      if (sm.length < 2) continue;

      // Centroid in grid space → nearest fixation → color + proximity
      let sx = 0, sy = 0;
      for (const p of sm) { sx += p.x; sy += p.y; }
      const cgx = sx / sm.length, cgy = sy / sm.length;

      const { gradT, distSq } = nearestFix(cgx, cgy, fixList);
      const col = sampleGradient(gradT);

      // proximity: 1 right at peak, min 0.15 far away — never zero
      const proximity = Math.max(0.15, 1 - distSq / falloffSq);

      const alpha = (0.28 + tl * 0.62) * proximity;
      const lw    = (0.5  + tl * 2.2)  * (0.35 + proximity * 0.65);

      ctx.beginPath();
      ctx.moveTo((sm[0].x / KDE_GRID) * W, (sm[0].y / KDE_GRID) * H);
      for (let i = 1; i < sm.length; i++) {
        ctx.lineTo((sm[i].x / KDE_GRID) * W, (sm[i].y / KDE_GRID) * H);
      }
      const isLoop = (sm[0].x-sm[sm.length-1].x)**2+(sm[0].y-sm[sm.length-1].y)**2 < 0.25;
      if (isLoop) ctx.closePath();

      ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha.toFixed(3)})`;
      ctx.lineWidth   = lw;
      ctx.stroke();
    }
  }
  ctx.restore();

  // Scanpath line
  if (scanPts.length >= 2) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(scanPts[0].x_px, scanPts[0].y_px);
    for (let i = 1; i < scanPts.length; i++) ctx.lineTo(scanPts[i].x_px, scanPts[i].y_px);
    ctx.strokeStyle = 'rgba(26,24,20,0.12)';
    ctx.lineWidth = 0.75;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Fixation dots + labels
  ctx.save();
  ctx.font = '300 10px "DM Mono", monospace';

  for (let i = 0; i < scanPts.length; i++) {
    const p      = scanPts[i];
    const dwell  = dwells[i];
    const gx     = Math.round((p.x_px / W) * (KDE_GRID - 1));
    const gy     = Math.round((p.y_px / H) * (KDE_GRID - 1));
    const idx    = Math.max(0, Math.min(KDE_GRID*KDE_GRID-1, gy*KDE_GRID+gx));
    const density = field[idx] || 0;
    const col    = sampleGradient(p.x_px / W);
    const radius = 3 + density * 9;

    // Dot
    ctx.beginPath();
    ctx.arc(p.x_px, p.y_px, radius, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},0.95)`;
    ctx.fill();

    // White pin
    ctx.beginPath();
    ctx.arc(p.x_px, p.y_px, radius * 0.38, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();

    // Label
    const lx = p.x_px + radius + 8, ly = p.y_px;
    const l1 = `#${i+1}`, l2 = `${dwell.toFixed(1)}s`;
    const pw = Math.max(ctx.measureText(l1).width, ctx.measureText(l2).width) + 10;
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fillRect(lx - 3, ly - 14, pw, 26);
    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},1.0)`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(l1, lx, ly - 5);
    ctx.fillStyle = 'rgba(26,24,20,0.5)';
    ctx.fillText(l2, lx, ly + 7);
  }
  ctx.restore();

  // Stamp
  ctx.save();
  ctx.font = '300 10px "DM Mono", monospace';
  ctx.fillStyle = 'rgba(26,24,20,0.18)';
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText(`${session.participant_id||'—'} · ${session.condition||'—'} · ${fmt(maxT)}`, W-20, H-60);
  ctx.restore();
}

// ─────────────────────────────────────────────
// SCRUBBER
// ─────────────────────────────────────────────
function fmt(ms) { return (ms/1000).toFixed(1)+'s'; }

scrubRange.addEventListener('input', () => {
  stopPlay();
  const t = Number(scrubRange.value);
  scrubTime.textContent = fmt(t);
  render(t);
});

function stopPlay() {
  if (playRafId) { cancelAnimationFrame(playRafId); playRafId = null; }
  isPlaying = false; scrubPlay.textContent = '▶';
}

function startPlay() {
  isPlaying = true; scrubPlay.textContent = '⏸';
  const from = Number(scrubRange.value) >= scrubMaxMs ? 0 : Number(scrubRange.value);
  playStartWall = performance.now(); playStartMs = from;
  function tick(now) {
    const t = playStartMs + (now - playStartWall);
    if (t >= scrubMaxMs) { scrubRange.value=scrubMaxMs; scrubTime.textContent=fmt(scrubMaxMs); render(scrubMaxMs); stopPlay(); return; }
    scrubRange.value = t; scrubTime.textContent = fmt(t); render(t);
    playRafId = requestAnimationFrame(tick);
  }
  playRafId = requestAnimationFrame(tick);
}

scrubPlay.addEventListener('click', () => { if (isPlaying) stopPlay(); else startPlay(); });

// ─────────────────────────────────────────────
// RESET + EXPORT
// ─────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  stopPlay(); session = null;
  canvas.style.display='none'; topbar.style.display='none'; scrubber.style.display='none';
  dropzone.classList.remove('hidden');
});

exportBtn.addEventListener('click', () => {
  if (!session) return;
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const pid  = session.participant_id || 'p';
    const cond = (session.condition||'cond').replace(/\s+/g,'_');
    const t    = Math.round(Number(scrubRange.value)/1000);
    a.download = `topo_${pid}_${cond}_${t}s.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
});
</script>
